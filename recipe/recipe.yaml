schema_version: 1

context:
  name: cantok
  version: "0.0.41"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cantok-${{ version }}.tar.gz
  sha256: 90db0851b56c61cc8f6dc677a9c9dff8246a9d21bf16506bc44158637cac582a

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - displayhooks >=0.0.6
    - typing_extensions
    - transfunctions >=0.0.12

tests:
  - python:
      imports:
        - cantok
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Implementation of the "Cancellation Token" pattern
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pomponchik/cantok
  documentation: http://cantok.readthedocs.io/

extra:
  recipe-maintainers:
    - thewchan
